seed: 42

data:
  raw_root: data/raw
  processed_root: data/processed
  source_modality: t1
  target_modality: t2
  split_ratio: 0.8
  min_foreground_ratio: 0.1
  image_size: 256

train:
  epochs: 20
  batch_size: 8
  lr: 0.0002
  lambda_cycle: 10.0
  lambda_identity: 5.0
  num_workers: 4
  save_every: 5
  amp: true
  max_batches_per_epoch: 600

model:
  in_channels: 1
  out_channels: 1
  ngf: 64
  ndf: 64
  n_res_blocks: 6
